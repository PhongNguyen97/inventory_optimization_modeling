project:
  demand_scale: weekly
  selected_families:
    - GROCERY I
    - BEVERAGES
    - CLEANING

policies:
  GROCERY I: SQ
  BEVERAGES: SQ
  CLEANING: RS

service_level:
  target_fill_rate: 0.95

lead_time:
  GROCERY I: 1
  BEVERAGES: 1
  CLEANING: 1

review_period:
  CLEANING: 1

costs:
  unit_cost: 1.0
  annual_holding_rate: 0.15
  order_cost: 25.0
  shortage_cost:
    GROCERY I: 15.0
    BEVERAGES: 12.0
    CLEANING: 15.0

simulation:
  n_replications: 10000
  random_seed: 42
  initial_inventory_rule: match_target # options: match_target (s for SQ, S for RS), zero, manual
  backorder: false # false means lost sales (main model)

uncertainty:
  main_method: ratio_bootstrap # options: ratio_bootstrap, residual_bootstrap, ratio_kde, residual_kde
  ratio_cap: p1_p99 # options: p1_p99, p2.5_p97.5, none
  epsilon: 1.0e-6

optimization:
  method: two_stage_grid_search
  safety_stock_max_sigma: 4.0
  local_search_max_rounds: 100
  local_search_threshold: 1.3

columns:
  family: family
  date: date
  train_actual: Actual_Sales
  train_fitted: Fitted_Sales
  test_forecast: forecast_sales
